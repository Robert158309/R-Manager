<!DOCTYPE html>

<html lang = "es">

    <head>

        <meta charset = "utf-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <link rel = "stylesheet" type = "text/css" href = "globalstyles.css">
        <title>R-Manager</title>

    </head>

    <body>

        <div class = "app">

            <div class="content">

                <nav id="navbar">

                    <div id="resize-handle"></div>

                        <div id="userview">
                            <h2>¡Bienvenido!</h2>
                            <p id="name"></p>
                        </div>

                        <button class="btns" data-view="dashboard.html">
                            <img src = "assets/img/presentation-analytics.svg" alt = "Dashboard Icon">
                            Resumen</button>
                        <button class="btns" data-view="inventory.html">
                            <img src = "assets/img/clipboard-list.svg" alt = "Inventory Icon">
                            Inventario</button>
                        <button class="btns" data-view="pending.html">
                            <img src = "assets/img/clock.svg" alt = "Pending Icon">
                            Pendientes</button>
                        <button class="btns" data-view="record.html">
                            <img src = "assets/img/clipboard-check.svg" alt = "Record Icon">
                            Historial</button>
                        <button class="btns" data-view="settings.html">
                            <img src = "assets/img/settings.svg" alt = "Settings Icon">
                            Configuración</button>
                   
                </nav>

                <aside id="right">

                    <br><br><br><br><br>

                    <h1 id="main-title">R-Manager</h1>

                    <br><br><br>

                    <p id="main-text">Para comenzar, en la barra de navegacion a su izquierda, seleccione una opción.</p>

                </aside>

            </div>

        </div>

        <footer>
            R-Manager v0.1 © 2026 Roberto Monzón • All rights reserved • Powered by caffeine & questionable decisions
        </footer>

        <script src="js/app.js"></script>
        <script src="js/ui.js"></script>

    </body>

</html>
