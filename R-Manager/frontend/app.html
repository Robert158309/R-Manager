<!DOCTYPE html>

<html lang = "es">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/app.css">
    <link rel="stylesheet" href="styles/views.css">
    <link rel="stylesheet" href="styles/forms.css">
    <title>R-Manager</title>

</head>

    <body>

        <div class = "app">

            <div class="content">

                <nav id="navbar">

                        <div id="userview">
                            <h2>¡Bienvenido!</h2>
                            <p id="name"></p>
                        </div>

                        <button class="btns" data-view="dashboard.html">
                                <img class = "imgicons" src = "assets/img/presentation-analytics.svg" alt = "Dashboard Icon">
                                <p class = "btntxt">Resumen</p>
                        </button>
                        <button class="btns" data-view="inventory.html">
                            <img class = "imgicons" src = "assets/img/clipboard-list.svg" alt = "Inventory Icon">
                            <p class = "btntxt">Inventario</p>
                        </button>
                        <button class="btns" data-view="pending.html">
                            <img class = "imgicons" src = "assets/img/clock.svg" alt = "Pending Icon">
                            <p class = "btntxt">En Curso</p>
                        </button>
                        <button class="btns" data-view="record.html">
                            <img class = "imgicons" src = "assets/img/clipboard-check.svg" alt = "Record Icon">
                            <p class = "btntxt">Historial</p>
                        </button>
                        <button class="btns" data-view="settings.html">
                            <img class = "imgicons" src = "assets/img/settings.svg" alt = "Settings Icon">
                            <p class = "btntxt">Configuración</p>
                        </button>
                   
                </nav>

                <aside id="right">

                    <br><br><br><br><br>

                    <h1 id="main-title">R-Manager</h1>

                    <br><br><br>

                    <p id="main-text">Para comenzar, en la barra de navegacion a su izquierda, seleccione una opción.</p>

                </aside>

            </div>

        </div>

        <script src="js/app.js"></script>
        <script src="js/ui.js"></script>

    </body>

</html>
