<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="authstyles.css">
    <title>Login</title>

</head>

    <body>

        <div class="container">

            <h1>R-Manager</h1>
            <p>Inicia sesión para continuar</p>

            <form>

                <input type="text" id="user" placeholder="Usuario">
                <input type="password" id="pass" placeholder="Contraseña">

                <button type="submit" onclick="login()">Entrar</button>

                <p id="error"></p>

            </form>

            <br>

            <div id = "optionscontainer">
                <p class = "opcionstext">¿Olvido su Contraseña?</p>
                <button class="optionsbtns" type="button" onclick="goTo('restore-user.html')">
                    Recuperar Contraseña
                </button>

                <p class = "opcionstext">¿Es nuevo usuario?</p>
                <button class="optionsbtns" type="button" onclick="goTo('new-user.html')">
                    Crear Usuario
                </button>
            </div>

        </div>

        <script src="../js/auth.js"></script>

    </body>

</html>
