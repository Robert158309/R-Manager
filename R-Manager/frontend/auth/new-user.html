<!DOCTYPE html>

<html lang = "es">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" type="text/css" href="authstyles.css">
		<title>Create-user</title>
	</head>

	<body>

		<div class = "container">

			<h1>Crear Nuevo Usuario</h1>

			<p>Rellene el formulario para crear un usuario nuevo</p>

			<form>

				<input type = "text" id = "new_user" placeholder = "Usuario">

				<input type = "password" id = "pass" placeholder = "Contraseña">

				<input type = "password" id = "passrep" placeholder = "Repetir Contraseña">

				<input type = "email" id = "mail" placeholder = "Correo de Recuperación"> 

				<button type="submit">Crear Usuario</button>

			</form>

			<button type="button" onclick="goLogin()">
			    Volver al login
			</button>
			
		</div>

		<script src="../js/auth.js"></script>

	</body>

</html>
